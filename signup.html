<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signup</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="card">
    <h1>Signup</h1>

    <form>
        <label for="firstName">First Name</label>
        <input id="firstName" name="firstName" type="text" placeholder="Enter your first name" required />

        <label for="lastName">Last Name</label>
        <input id="lastName" name="lastName" type="text" placeholder="Enter your last name" required />

        <label for="userId">User ID</label>
        <input id="userId" name="userId" type="text" placeholder="Create a user id" required />

        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="Create a password" required />

        <button type="submit">Submit</button>
    </form>

    <p class="link">
        Already have an account?
        <a href="login.html">Login</a>
    </p>
</div>
</body>
</html>
